<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Minimalist Shipping Box Icon -->
  <!-- Top Face -->
  <polygon points="256,80 448,176 256,272 64,176" fill="#3B82F6" stroke="#1E293B" stroke-width="24" stroke-linejoin="round"/>
  <!-- Left Face -->
  <polygon points="64,176 256,272 256,464 64,368" fill="#60A5FA" stroke="#1E293B" stroke-width="24" stroke-linejoin="round"/>
  <!-- Right Face -->
